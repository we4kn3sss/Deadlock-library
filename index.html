<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Origami Flight</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #d1d9e0; 
            font-family: sans-serif; user-select: none; 
            -webkit-user-select: none; touch-action: none; 
        }
        
        #ui { position: absolute; top: 40px; left: 20px; color: #444; font-size: 20px; font-weight: bold; z-index: 10; }
        #lives { position: absolute; top: 40px; right: 20px; font-size: 22px; z-index: 10; }

        #controls { 
            position: absolute; bottom: 50px; left: 50%; 
            transform: translateX(-50%); display: grid; 
            grid-template-columns: repeat(3, 85px); gap: 15px; z-index: 10;
        }
        
        .btn { 
            width: 85px; height: 85px; background: rgba(255,255,255,0.5); 
            border: 2px solid rgba(0,0,0,0.1); border-radius: 20px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 35px; color: #333; touch-action: none;
        }
        
        /* Класс для активной кнопки (подсветка) */
        .btn.active { background: rgba(255,255,255,0.9); transform: scale(0.9); border-color: #000; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(209, 217, 224, 0.98); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20;
        }
        #restart-btn {
            padding: 20px 40px; background: #333; color: #fff;
            border-radius: 10px; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="lives">🖤🖤🖤</div>
    
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="final-score">SCORE: 0</p>
        <div id="restart-btn">ИГРАТЬ СНОВА</div>
    </div>

    <div id="controls">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let score = 0, lives = 3, isGameOver = false;
        const keys = { up: false, down: false, left: false, right: false };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1d9e0);
        scene.fog = new THREE.Fog(0xd1d9e0, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Самолёт
        const planeGroup = new THREE.Group();
        const paperMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: 2 });
        
        const body = new THREE.Mesh(new THREE.ConeGeometry(0.15, 2, 3), paperMat);
        body.rotation.x = Math.PI/2; body.rotation.z = Math.PI;
        planeGroup.add(body);

        const wingGeom = new THREE.BufferGeometry();
        const vertices = new Float32Array([0,0,1, -1.5,0,-1, 1.5,0,-1]);
        wingGeom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        const wings = new THREE.Mesh(wingGeom, paperMat);
        planeGroup.add(wings);
        scene.add(planeGroup);

        scene.add(new THREE.DirectionalLight(0xffffff, 1));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Кольца
        const rings = [];
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        for(let i=0; i<7; i++) {
            const r = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.05, 12, 24), ringMat);
            r.position.set(0, 0, -40 - i*40);
            r.userData = { passed: false };
            scene.add(r);
            rings.push(r);
        }

        // --- УПРАВЛЕНИЕ (УНИВЕРСАЛЬНОЕ) ---
        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            
            // Обработка нажатия (палец или мышь)
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if(isGameOver) return;
                keys[key] = true;
                el.classList.add('active'); // Подсветка кнопки
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });

            // Обработка отпускания
            const stop = (e) => {
                e.preventDefault();
                keys[key] = false;
                el.classList.remove('active');
            };

            el.addEventListener('pointerup', stop);
            el.addEventListener('pointerleave', stop);
            el.addEventListener('pointercancel', stop);
        };

        setupBtn('up', 'up'); setupBtn('down', 'down');
        setupBtn('left', 'left'); setupBtn('right', 'right');

        // --- ЛОГИКА ИГРЫ ---
        function resetGame() {
            score = 0; lives = 3; isGameOver = false;
            document.getElementById('score').innerText = "0";
            document.getElementById('lives').innerText = "🖤🖤🖤";
            document.getElementById('game-over').style.display = 'none';
            planeGroup.position.set(0,0,0);
            rings.forEach((r, i) => {
                r.position.set(Math.random()*14-7, Math.random()*10-5, -40 - i*40);
                r.userData.passed = false;
            });
        }
        document.getElementById('restart-btn').addEventListener('pointerdown', resetGame);

        function animate() {
            requestAnimationFrame(animate);
            if(isGameOver) { renderer.render(scene, camera); return; }

            planeGroup.position.z -= 0.35;

            // Движение
            if(keys.left) planeGroup.position.x -= 0.2;
            if(keys.right) planeGroup.position.x += 0.2;
            if(keys.up) planeGroup.position.y += 0.2;
            if(keys.down) planeGroup.position.y -= 0.2;

            // Наклоны
            planeGroup.rotation.z = THREE.MathUtils.lerp(planeGroup.rotation.z, keys.left ? 0.5 : (keys.right ? -0.5 : 0), 0.1);

            camera.position.set(planeGroup.position.x, planeGroup.position.y + 1.5, planeGroup.position.z + 7);
            camera.lookAt(planeGroup.position.x, planeGroup.position.y, planeGroup.position.z - 5);

            rings.forEach(r => {
                const dx = planeGroup.position.x - r.position.x;
                const dy = planeGroup.position.y - r.position.y;
                const distXY = Math.sqrt(dx*dx + dy*dy);

                // Проверка пролета
                if(!r.userData.passed && Math.abs(planeGroup.position.z - r.position.z) < 0.6) {
                    if(distXY < 2.5) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        r.userData.passed = true;
                    }
                }

                // Промах
                if(r.position.z > planeGroup.position.z + 2) {
                    if(!r.userData.passed) {
                        lives--;
                        document.getElementById('lives').innerText = "🖤".repeat(lives);
                        paperMat.color.set(0xff0000);
                        setTimeout(() => paperMat.color.set(0xffffff), 200);
                        if(lives <= 0) {
                            isGameOver = true;
                            document.getElementById('game-over').style.display = 'flex';
                            document.getElementById('final-score').innerText = "SCORE: " + score;
                        }
                    }
                    r.userData.passed = false;
                    r.position.z -= 280;
                    r.position.x = Math.random()*14-7;
                    r.position.y = Math.random()*10-5;
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
