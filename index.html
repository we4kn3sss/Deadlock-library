<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Origami Flight TWA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #d1d9e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        
        #ui { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            color: #444; font-size: 22px; font-weight: 800; z-index: 10;
        }

        #lives {
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px;
            font-size: 24px; color: #000; z-index: 10; letter-spacing: 5px;
        }

        #controls { 
            position: absolute; bottom: env(safe-area-inset-bottom, 30px); left: 50%; 
            transform: translateX(-50%); display: grid; 
            grid-template-columns: repeat(3, 80px); gap: 15px; z-index: 10;
        }
        
        .btn { 
            width: 80px; height: 80px; background: rgba(255,255,255,0.4); 
            border: 1px solid rgba(255,255,255,0.6); border-radius: 20px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 32px; color: #333; touch-action: none; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        
        .btn:active { background: rgba(255,255,255,0.8); transform: scale(0.9); }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(209, 217, 224, 0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #333;
        }
        #game-over h1 { font-size: 40px; margin-bottom: 10px; }
        #restart-btn {
            padding: 15px 40px; background: #333; color: #fff;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="lives">🖤🖤🖤</div>
    
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="final-score" style="font-size: 20px; margin-bottom: 20px;">SCORE: 0</p>
        <div id="restart-btn">ИГРАТЬ СНОВА</div>
    </div>

    <div id="controls">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let score = 0;
        let lives = 3;
        let isGameOver = false;
        const keys = { up: false, down: false, left: false, right: false };

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1d9e0);
        scene.fog = new THREE.Fog(0xd1d9e0, 15, 95);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Модель самолетика
        const planeGroup = new THREE.Group();
        const paperMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.7 });

        function createShape(pts) {
            const s = new THREE.Shape();
            s.moveTo(pts.x, pts.y);
            for(let i=1; i<pts.length; i++) s.lineTo(pts[i].x, pts[i].y);
            return new THREE.Mesh(new THREE.ShapeGeometry(s), paperMat);
        }

        const keel = new THREE.Mesh(new THREE.ConeGeometry(0.12, 2.2, 3), paperMat);
        keel.rotation.x = Math.PI / 2; keel.rotation.z = Math.PI;
        keel.position.y = -0.15; keel.scale.set(0.3, 1, 1);
        planeGroup.add(keel);

        const leftWing = createShape([{x:0,y:1.1}, {x:-1.3,y:-1}, {x:-0.2,y:-0.7}, {x:0,y:-0.5}]);
        leftWing.rotation.x = -Math.PI / 2; leftWing.rotation.y = -0.08;
        planeGroup.add(leftWing);

        const rightWing = createShape([{x:0,y:1.1}, {x:1.3,y:-1}, {x:0.2,y:-0.7}, {x:0,y:-0.5}]);
        rightWing.rotation.x = -Math.PI / 2; rightWing.rotation.y = 0.08;
        planeGroup.add(rightWing);

        scene.add(planeGroup);

        const sun = new THREE.DirectionalLight(0xffffff, 0.9);
        sun.position.set(5, 10, 5);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // Кольца
        const rings = [];
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x999999 });
        function spawnRing(z) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(2.4, 0.06, 12, 32), ringMat);
            ring.userData = { passed: false };
            ring.position.set(Math.random()*16-8, Math.random()*10-5, z);
            scene.add(ring);
            rings.push(ring);
        }
        for(let i=1; i<=7; i++) spawnRing(-i * 40);

        // Управление (Новый метод)
        const setupControl = (id, key) => {
            const el = document.getElementById(id);
            const start = (e) => { 
                e.preventDefault(); 
                if(!isGameOver) keys[key] = true; 
            };
            const stop = (e) => { 
                e.preventDefault(); 
                keys[key] = false; 
            };
            el.addEventListener('touchstart', start, {passive: false});
            el.addEventListener('touchend', stop, {passive: false});
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', stop);
            el.addEventListener('mouseleave', stop);
        };
        ['up','down','left','right'].forEach(k => setupControl(k, k));

        function updateLivesDisplay() {
            document.getElementById('lives').innerText = "🖤".repeat(lives);
        }

        function takeDamage() {
            lives--;
            updateLivesDisplay();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            
            paperMat.color.set(0xff0000);
            setTimeout(() => paperMat.color.set(0xffffff), 200);

            if (lives <= 0) gameOver();
        }

        function gameOver() {
            isGameOver = true;
            // Сбрасываем нажатия
            for(let k in keys) keys[k] = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = "SCORE: " + score;
        }

        function resetGame() {
            score = 0; lives = 3; isGameOver = false;
            document.getElementById('score').innerText = score;
            updateLivesDisplay();
            document.getElementById('game-over').style.display = 'none';
            planeGroup.position.set(0,0,0);
            rings.forEach((r, i) => {
                r.userData.passed = false;
                r.position.set(Math.random()*16-8, Math.random()*10-5, -(i+1)*40);
            });
        }
        document.getElementById('restart-btn').addEventListener('click', resetGame);
        document.getElementById('restart-btn').addEventListener('touchstart', resetGame);

        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) { renderer.render(scene, camera); return; }

            planeGroup.position.z -= 0.35;

            let rZ = 0, rX = 0;
            const step = 0.18;
            if (keys.left) { planeGroup.position.x -= step; rZ = 0.6; }
            if (keys.right) { planeGroup.position.x += step; rZ = -0.6; }
            if (keys.up) { planeGroup.position.y += step; rX = -0.3; }
            if (keys.down) { planeGroup.position.y -= step; rX = 0.3; }

            planeGroup.rotation.z = THREE.MathUtils.lerp(planeGroup.rotation.z, rZ, 0.1);
            planeGroup.rotation.x = THREE.MathUtils.lerp(planeGroup.rotation.x, rX, 0.1);

            camera.position.set(
                THREE.MathUtils.lerp(camera.position.x, planeGroup.position.x, 0.08),
                THREE.MathUtils.lerp(camera.position.y, planeGroup.position.y + 1, 0.08),
                planeGroup.position.z + 6
            );
            camera.lookAt(planeGroup.position.x, planeGroup.position.y, planeGroup.position.z - 4);

            rings.forEach(r => {
                const dx = planeGroup.position.x - r.position.x;
                const dy = planeGroup.position.y - r.position.y;
                const distanceXY = Math.sqrt(dx * dx + dy * dy);

                if (!r.userData.passed && Math.abs(planeGroup.position.z - r.position.z) < 0.5) {
                    if (distanceXY < 2.5) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        r.userData.passed = true;
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                    }
                }
                
                if (r.position.z > planeGroup.position.z + 2) {
                    if (!r.userData.passed) takeDamage();
                    r.userData.passed = false;
                    r.position.z -= 280;
                    r.position.x = Math.random()*16-8;
                    r.position.y = Math.random()*10-5;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
