<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Origami Flight Joystick</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #d1d9e0; 
            font-family: sans-serif; user-select: none; 
            -webkit-user-select: none; touch-action: none;
        }
        
        #ui { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            color: #444; font-size: 22px; font-weight: 800; z-index: 10;
        }

        #lives {
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px;
            font-size: 24px; color: #000; z-index: 10; letter-spacing: 5px;
        }

        /* Стили джойстика */
        #joystick-base {
            position: absolute; width: 100px; height: 100px;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%; display: none; z-index: 5; pointer-events: none;
        }
        #joystick-stick {
            position: absolute; width: 50px; height: 50px;
            background: rgba(255,255,255,0.6); border-radius: 50%;
            display: none; z-index: 6; pointer-events: none;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(209, 217, 224, 0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #333;
        }
        #restart-btn {
            padding: 15px 40px; background: #333; color: #fff;
            border-radius: 15px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="lives">🖤🖤🖤</div>
    
    <div id="joystick-base"></div>
    <div id="joystick-stick"></div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="final-score" style="font-size: 20px; margin-bottom: 20px;">SCORE: 0</p>
        <div id="restart-btn" onclick="resetGame()">ИГРАТЬ СНОВА</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let score = 0, lives = 3, isGameOver = false;
        let baseSpeed = 0.22;
        
        // Переменные джойстика
        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');
        let stickActive = false;
        let startPos = { x: 0, y: 0 };
        let currentInput = { x: 0, y: 0 }; // От -1 до 1

        const vel = { x: 0, y: 0 };
        const friction = 0.92;
        const accelMult = 0.03; // Чувствительность стика

        // Three.js Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1d9e0);
        scene.fog = new THREE.Fog(0xd1d9e0, 15, 95);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const planeGroup = new THREE.Group();
        const paperMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: 2, roughness: 0.7 });

        function createShape(pts) {
            const s = new THREE.Shape();
            s.moveTo(pts.x, pts.y);
            for(let i=1; i<pts.length; i++) s.lineTo(pts[i].x, pts[i].y);
            return new THREE.Mesh(new THREE.ShapeGeometry(s), paperMat);
        }

        const keel = new THREE.Mesh(new THREE.ConeGeometry(0.12, 2.2, 3), paperMat);
        keel.rotation.x = Math.PI/2; keel.rotation.z = Math.PI;
        keel.position.y = -0.15; keel.scale.set(0.3, 1, 1);
        planeGroup.add(keel);

        const leftWing = createShape([{x:0,y:1.1}, {x:-1.3,y:-1}, {x:-0.2,y:-0.7}, {x:0,y:-0.5}]);
        leftWing.rotation.x = -Math.PI/2; leftWing.rotation.y = -0.08;
        planeGroup.add(leftWing);

        const rightWing = createShape([{x:0,y:1.1}, {x:1.3,y:-1}, {x:0.2,y:-0.7}, {x:0,y:-0.5}]);
        rightWing.rotation.x = -Math.PI/2; rightWing.rotation.y = 0.08;
        planeGroup.add(rightWing);

        scene.add(planeGroup);
        scene.add(new THREE.DirectionalLight(0xffffff, 0.9).add(new THREE.AmbientLight(0xffffff, 0.4)));

        const rings = [];
        function spawnRing(z) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(2.4, 0.06, 12, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x999999 }));
            ring.userData = { passed: false };
            ring.position.set(Math.random()*16-8, Math.random()*10-5, z);
            scene.add(ring);
            rings.push(ring);
        }
        for(let i=1; i<=7; i++) spawnRing(-i * 40);

        // --- ЛОГИКА ДЖОЙСТИКА ---
        window.addEventListener('touchstart', (e) => {
            if (isGameOver) return;
            stickActive = true;
            const touch = e.touches;
            startPos = { x: touch.clientX, y: touch.clientY };

            joystickBase.style.display = 'block';
            joystickStick.style.display = 'block';
            joystickBase.style.left = `${startPos.x - 50}px`;
            joystickBase.style.top = `${startPos.y - 50}px`;
            joystickStick.style.left = `${startPos.x - 25}px`;
            joystickStick.style.top = `${startPos.y - 25}px`;
        });

        window.addEventListener('touchmove', (e) => {
            if (!stickActive) return;
            const touch = e.touches;
            const dist = { x: touch.clientX - startPos.x, y: touch.clientY - startPos.y };
            
            const maxDist = 50;
            const angle = Math.atan2(dist.y, dist.x);
            const moveDist = Math.min(Math.sqrt(dist.x**2 + dist.y**2), maxDist);

            const moveX = Math.cos(angle) * moveDist;
            const moveY = Math.sin(angle) * moveDist;

            joystickStick.style.left = `${startPos.x + moveX - 25}px`;
            joystickStick.style.top = `${startPos.y + moveY - 25}px`;

            // Нормализуем ввод в диапазон -1...1
            currentInput.x = moveX / maxDist;
            currentInput.y = - (moveY / maxDist); // Инвертируем Y для привычного управления
        });

        window.addEventListener('touchend', () => {
            stickActive = false;
            currentInput = { x: 0, y: 0 };
            joystickBase.style.display = 'none';
            joystickStick.style.display = 'none';
        });

        function resetGame() {
            score = 0; lives = 3; isGameOver = false; baseSpeed = 0.22;
            vel.x = 0; vel.y = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = "🖤🖤🖤";
            document.getElementById('game-over').style.display = 'none';
            planeGroup.position.set(0,0,0);
            rings.forEach((r, i) => {
                r.userData.passed = false;
                r.position.set(Math.random()*16-8, Math.random()*10-5, -(i+1)*40);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) { renderer.render(scene, camera); return; }

            planeGroup.position.z -= baseSpeed;

            // Применяем ввод от джойстика к ускорению
            vel.x += currentInput.x * accelMult;
            vel.y += currentInput.y * accelMult;

            vel.x *= friction;
            vel.y *= friction;

            planeGroup.position.x += vel.x;
            planeGroup.position.y += vel.y;

            planeGroup.rotation.z = THREE.MathUtils.lerp(planeGroup.rotation.z, -vel.x * 10, 0.1);
            planeGroup.rotation.x = THREE.MathUtils.lerp(planeGroup.rotation.x, vel.y * 5, 0.1);

            camera.position.set(
                THREE.MathUtils.lerp(camera.position.x, planeGroup.position.x, 0.08),
                THREE.MathUtils.lerp(camera.position.y, planeGroup.position.y + 1, 0.08),
                planeGroup.position.z + 6
            );
            camera.lookAt(planeGroup.position.x, planeGroup.position.y, planeGroup.position.z - 4);

            rings.forEach(r => {
                const distXY = Math.sqrt((planeGroup.position.x - r.position.x)**2 + (planeGroup.position.y - r.position.y)**2);
                if (!r.userData.passed && Math.abs(planeGroup.position.z - r.position.z) < 0.6) {
                    if (distXY < 2.5) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        r.userData.passed = true;
                        if (score > 0 && score % 100 === 0) {
                            baseSpeed *= 1.15;
                            tg.HapticFeedback.notificationOccurred('success');
                        } else {
                            tg.H
