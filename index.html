<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Origami Flight</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #d1d9e0; 
            font-family: sans-serif; user-select: none; 
            -webkit-user-select: none; touch-action: none; 
        }
        
        #ui { position: absolute; top: 40px; left: 20px; color: #444; font-size: 18px; font-weight: bold; z-index: 10; }
        #debug { position: absolute; top: 70px; left: 20px; color: red; font-size: 12px; z-index: 10; }
        #lives { position: absolute; top: 40px; right: 20px; font-size: 22px; z-index: 10; }

        #controls { 
            position: absolute; bottom: 50px; left: 50%; 
            transform: translateX(-50%); display: grid; 
            grid-template-columns: repeat(3, 85px); gap: 15px; z-index: 10;
        }
        
        .btn { 
            width: 85px; height: 85px; background: rgba(255,255,255,0.5); 
            border: 2px solid rgba(0,0,0,0.1); border-radius: 20px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 35px; color: #333; touch-action: none;
        }
        
        .btn.active { background: rgba(255,255,255,0.95); border-color: #000; transform: scale(0.9); }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(209, 217, 224, 0.98); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20;
        }
        #restart-btn { padding: 20px 40px; background: #333; color: #fff; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="debug"></div>
    <div id="lives">🖤🖤🖤</div>
    
    <div id="game-over">
        <h1>GAME OVER</h1>
        <div id="restart-btn">ИГРАТЬ СНОВА</div>
    </div>

    <div id="controls">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let score = 0, lives = 3, isGameOver = false;
        // Глобальный объект состояния клавиш
        const input = { up: false, down: false, left: false, right: false };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1d9e0);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Самолёт (упрощенная меш-структура для стабильности)
        const planeGroup = new THREE.Group();
        const paperMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: 2 });
        const body = new THREE.Mesh(new THREE.ConeGeometry(0.2, 2, 4), paperMat);
        body.rotation.x = Math.PI/2;
        planeGroup.add(body);
        const wings = new THREE.Mesh(new THREE.BoxGeometry(3, 0.05, 1), paperMat);
        planeGroup.add(wings);
        scene.add(planeGroup);

        scene.add(new THREE.DirectionalLight(0xffffff, 1));
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const rings = [];
        for(let i=0; i<7; i++) {
            const r = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.05, 12, 24), new THREE.MeshStandardMaterial({color: 0xffffff}));
            r.position.set(0, 0, -40 - i*40);
            r.userData = { passed: false };
            scene.add(r);
            rings.push(r);
        }

        // --- ФУНКЦИЯ УПРАВЛЕНИЯ ---
        function bindControl(id, key) {
            const el = document.getElementById(id);
            
            const press = (e) => {
                e.preventDefault();
                input[key] = true;
                el.classList.add('active');
            };
            const release = (e) => {
                e.preventDefault();
                input[key] = false;
                el.classList.remove('active');
            };

            el.addEventListener('pointerdown', press);
            el.addEventListener('pointerup', release);
            el.addEventListener('pointerleave', release);
            el.addEventListener('pointercancel', release);
        }

        bindControl('up', 'up'); bindControl('down', 'down');
        bindControl('left', 'left'); bindControl('right', 'right');

        function resetGame() {
            score = 0; lives = 3; isGameOver = false;
            document.getElementById('score').innerText = "0";
            document.getElementById('lives').innerText = "🖤🖤🖤";
            document.getElementById('game-over').style.display = 'none';
            planeGroup.position.set(0,0,0);
            rings.forEach((r, i) => {
                r.position.set(Math.random()*14-7, Math.random()*10-5, -40 - i*40);
                r.userData.passed = false;
            });
        }
        document.getElementById('restart-btn').addEventListener('click', resetGame);

        function animate() {
            requestAnimationFrame(animate);
            if(isGameOver) { renderer.render(scene, camera); return; }

            // Полет вперед (постоянный)
            planeGroup.position.z -= 0.4;

            // Движение самолета по осям
            const speed = 0.25;
            if (input.left)  planeGroup.position.x -= speed;
            if (input.right) planeGroup.position.x += speed;
            if (input.up)    planeGroup.position.y += speed;
            if (input.down)  planeGroup.position.y -= speed;

            // DEBUG инфо для тебя (удалим потом)
            document.getElementById('debug').innerText = `L:${input.left} R:${input.right} U:${input.up} D:${input.down}`;

            // Наклон при повороте
            let targetRot = 0;
            if (input.left) targetRot = 0.6;
            if (input.right) targetRot = -0.6;
            planeGroup.rotation.z = THREE.MathUtils.lerp(planeGroup.rotation.z, targetRot, 0.1);

            // Камера следует за самолетом
            camera.position.x = planeGroup.position.x;
            camera.position.y = planeGroup.position.y + 1.5;
            camera.position.z = planeGroup.position.z + 7;
            camera.lookAt(planeGroup.position.x, planeGroup.position.y, planeGroup.position.z - 5);

            // Кольца и Жизни
            rings.forEach(r => {
                const dx = planeGroup.position.x - r.position.x;
                const dy = planeGroup.position.y - r.position.y;
                const distXY = Math.sqrt(dx*dx + dy*dy);

                if(!r.userData.passed && Math.abs(planeGroup.position.z - r.position.z) < 0.6) {
                    if(distXY < 2.5) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        r.userData.passed = true;
                        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    }
                }

                if(r.position.z > planeGroup.position.z + 2) {
                    if(!r.userData.passed) {
                        lives--;
                        document.getElementById('lives').innerText = "🖤".repeat(lives);
                        if(lives <= 0) {
                            isGameOver = true;
                            document.getElementById('game-over').style.display = 'flex';
                        }
                    }
                    r.userData.passed = false;
                    r.position.z -= 280;
                    r.position.x = Math.random()*14-7;
                    r.position.y = Math.random()*10-5;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
