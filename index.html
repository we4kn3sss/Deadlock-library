<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Origami Flight Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Обнуляем всё, чтобы избежать сдвигов */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #d1d9e0; 
            position: fixed; touch-action: none;
        }

        #game-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #ui { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            color: #444; font-size: 20px; font-weight: 800; 
        }

        #lives { 
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px; 
            font-size: 22px; letter-spacing: 5px; 
        }

        /* Джойстик */
        #joystick-base { 
            position: fixed; width: 100px; height: 100px; 
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); 
            border-radius: 50%; display: none; pointer-events: none; z-index: 100;
        }
        #joystick-stick { 
            position: fixed; width: 50px; height: 50px; 
            background: rgba(255,255,255,0.6); border-radius: 50%; 
            display: none; pointer-events: none; z-index: 101;
        }

        /* Экран проигрыша */
        #game-over { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(209, 217, 224, 0.98); display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; color: #333; pointer-events: auto;
        }
        
        #restart-btn { 
            padding: 15px 45px; background: #333; color: #fff; 
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="ui">SCORE: <span id="score-val">0</span></div>
        <div id="lives">🖤🖤🖤</div>
        <div id="joystick-base"></div>
        <div id="joystick-stick"></div>
        
        <div id="game-over">
            <h1 style="font-size: 32px; margin-bottom: 5px;">GAME OVER</h1>
            <p id="final-score" style="font-size: 18px; margin-bottom: 25px;">SCORE: 0</p>
            <div id="restart-btn" onclick="resetGame()">ИГРАТЬ СНОВА</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Переменные состояния
        let score = 0, lives = 3, isGameOver = false, baseSpeed = 0.22;
        const vel = { x: 0, y: 0 }, friction = 0.92, accelMult = 0.04;
        let stickActive = false, startPos = { x: 0, y: 0 }, currentInput = { x: 0, y: 0 };

        // Элементы DOM
        const scoreEl = document.getElementById('score-val');
        const livesEl = document.getElementById('lives');
        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');
        const gameOverScreen = document.getElementById('game-over');

        // Three.js База
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1d9e0);
        scene.fog = new THREE.Fog(0xd1d9e0, 15, 95);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // Модель самолета
        const planeGroup = new THREE.Group();
        const paperMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: 2, roughness: 0.7 });

        function createWing(pts) {
            const s = new THREE.Shape();
            s.moveTo(pts.x, pts.y);
            for(let i=1; i<pts.length; i++) s.lineTo(pts[i].x, pts[i].y);
            return new THREE.Mesh(new THREE.ShapeGeometry(s), paperMat);
        }

        const keel = new THREE.Mesh(new THREE.ConeGeometry(0.12, 2.2, 3), paperMat);
        keel.rotation.x = Math.PI/2; keel.rotation.z = Math.PI;
        keel.position.y = -0.15; keel.scale.set(0.3, 1, 1);
        planeGroup.add(keel);
        planeGroup.add(createWing([{x:0,y:1.1}, {x:-1.3,y:-1}, {x:-0.2,y:-0.7}, {x:0,y:-0.5}]));
        planeGroup.add(createWing([{x:0,y:1.1}, {x:1.3,y:-1}, {x:0.2,y:-0.7}, {x:0,y:-0.5}]));
        scene.add(planeGroup);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Кольца
        const rings = [];
        function spawnRing(z) {
            const r = new THREE.Mesh(new THREE.TorusGeometry(2.4, 0.06, 12, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            r.position.set(Math.random()*14-7, Math.random()*10-5, z);
            r.userData = { passed: false };
            scene.add(r); rings.push(r);
        }
        for(let i=1; i<=7; i++) spawnRing(-i * 40);

        // Управление джойстиком
        window.addEventListener('touchstart', (e) => {
            if (isGameOver) return;
            const t = e.touches;
            if (t.clientY < 80) return; // Не мешаем кнопке "Назад" в Telegram

            stickActive = true;
            startPos = { x: t.clientX, y: t.clientY };
            
            joystickBase.style.display = 'block';
            joystickStick.style.display = 'block';
            joystickBase.style.left = (startPos.x - 50) + 'px';
            joystickBase.style.top = (startPos.y - 50) + 'px';
            joystickStick.style.left = (startPos.x - 25) + 'px';
            joystickStick.style.top = (startPos.y - 25) + 'px';
        });

        window.addEventListener('touchmove', (e) => {
            if (!stickActive) return;
            const t = e.touches;
            const dx = t.clientX - startPos.x;
            const dy = t.clientY - startPos.y;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            const mx = Math.cos(angle) * dist;
            const my = Math.sin(angle) * dist;
            
            joystickStick.style.left = (startPos.x + mx - 25) + 'px';
            joystickStick.style.top = (startPos.y + my - 25) + 'px';
            
            currentInput.x = mx / 50; 
            currentInput.y = -(my / 50);
        });

        window.addEventListener('touchend', () => {
            stickActive = false;
            currentInput = { x: 0, y: 0 };
            joystickBase.style.display = 'none';
            joystickStick.style.display = 'none';
        });

        // Логика игры
        function resetGame() {
            score = 0; lives = 3; isGameOver = false; baseSpeed = 0.22;
            vel.x = 0; vel.y = 0;
            scoreEl.innerText = "0";
            livesEl.innerText = "🖤🖤🖤";
            gameOverScreen.style.display = 'none';
            planeGroup.position.set(0, 0, 0);
            rings.forEach((r, i) => {
                r.userData.passed = false;
                r.position.set(Math.random()*14-7, Math.random()*10-5, -(i+1)*40);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) { renderer.render(scene, camera); return; }

            // Движение вперед
            planeGroup.position.z -= baseSpeed;

            // Физика управления
            vel.x = (vel.x + currentInput.x * accelMult) * friction;
            vel.y = (vel.y + currentInput.y * accelMult) * friction;
            planeGroup.position.x += vel.x;
            planeGroup.position.y += vel.y;

            // Визуальные наклоны
            planeGroup.rotation.z = THREE.MathUtils.lerp(planeGroup.rotation.z, -vel.x * 8, 0.1);
            planeGroup.rotation.x = THREE.MathUtils.lerp(planeGroup.rotation.x, vel.y * 4, 0.1);

            // Камера
            camera.position.set(
                THREE.MathUtils.lerp(camera.position.x, planeGroup.position.x, 0.08),
                THREE.MathUtils.lerp(camera.position.y, planeGroup.position.y + 1, 0.08),
                planeGroup.position.z + 6
            );
            camera.lookAt(planeGroup.position.x, planeGroup.position.y, planeGroup.position.z - 4);

            // Кольца и коллизии
            rings.forEach(r => {
                const distXY = Math.sqrt((planeGroup.position.x - r.position.x)**2 + (planeGroup.position.y - r.position.y)**2);
                
                // Пролет сквозь кольцо
                if (!r.userData.passed && Math.abs(planeGroup.position.z - r.position.z) < 0.6) {
                    if (distXY < 2.5) {
                        score += 10;
                        scoreEl.innerText = score;
                        r.userData.passed = true;
                        if (score % 100 === 0) baseSpeed *= 1.15; // Ускорение
                        tg.HapticFeedback.impactOccurred('medium');
                    }
                }

                // Пролет мимо (кольцо ушло за спину)
                if (r.position.z > planeGroup.position.z + 2) {
                    if (!r.userData.passed) {
                        lives--;
                        livesEl.innerText = "🖤".repeat(Math.max(0, lives));
                        paperMat.color.set(0xff0000);
                        setTimeout(() => paperMat.color.set(0xffffff), 200);
                        tg.HapticFeedback.notificationOccurred('error');
                        
                        if (lives <= 0) {
                            isGameOver = true;
                            document.getElementById('final-score').innerText = "SCORE: " + score;
                            gameOverScreen.style.display = 'flex';
                        }
                    }
                    r.userData.passed = false;
                    r.position.z -= 280;
                    r.position.x = Math.random()*14-7;
                    r.position.y = Math.random()*10-5;
                }
            });

            renderer.render(scene, camera);
        }

        // Запуск
        animate();

        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    </script>
</body>
</html>
